<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary text-center mb-xs">
                BoutikOS
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center px-lg">
                Gérez votre boutique, même sans internet
            </p>
</div>
<!-- Login Form -->
<form class="w-full max-w-sm space-y-md" onsubmit="event.preventDefault();">
<div class="flex flex-col">
<label class="font-label-md text-label-md text-outline mb-xs ml-base" for="email">
                    Email
                </label>
<input class="login-input w-full bg-surface-container-lowest focus:ring-2 focus:ring-primary-container focus:border-transparent outline-none font-body-md text-on-surface" id="email" placeholder="votre@email.com" required="" type="email"/>
</div>
<div class="flex flex-col">
<div class="flex justify-between items-center mb-xs">
<label class="font-label-md text-label-md text-outline ml-base" for="password">
                        Mot de passe
                    </label>
<button class="text-label-md font-label-md text-primary-container hover:underline" type="button">
                        Oublié ?
                    </button>
</div>
<div class="relative">
<input class="login-input w-full bg-surface-container-lowest focus:ring-2 focus:ring-primary-container focus:border-transparent outline-none font-body-md text-on-surface" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-outline" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="pt-sm">
<button class="primary-btn w-full flex items-center justify-center font-headline-sm text-headline-sm text-on-primary shadow-md hover:bg-primary transition-colors" type="submit">
                    Se connecter
                </button>
</div>
<div class="text-center pt-md">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Nouveau ici ? 
                    <button class="font-label-md text-label-md text-primary font-bold hover:underline" type="button">
                        Créer un compte
                    </button>
</p>
</div>
</form>
<!-- Footer / Offline Indicator -->
<div class="mt-xl flex items-center gap-xs px-md py-sm bg-secondary-container/20 rounded-full">
<span class="material-symbols-outlined text-secondary text-sm" style="font-variation-settings: 'FILL' 1;">wifi_off</span>
<span class="font-label-md text-label-md text-secondary">Mode hors-ligne disponible</span>
</div>
</main>
<!-- Visual Decoration -->
<div class="decorative-wave"></div>
<script>
        // Micro-interaction for input focus effects
        const inputs = document.querySelectorAll('.login-input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label').classList.replace('text-outline', 'text-primary-container');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label').classList.replace('text-primary-container', 'text-outline');
            });
        });

        // Password visibility toggle
        const togglePass = document.querySelector('[data-icon="visibility"]').parentElement;
        const passInput = document.getElementById('password');
        togglePass.addEventListener('click', () => {
            const isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            togglePass.querySelector('span').textContent = isPass ? 'visibility_off' : 'visibility';
        });
    </script>
</body></html>
